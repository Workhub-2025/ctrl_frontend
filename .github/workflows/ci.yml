name: FrontEnd CI

on:
  push:
    branches: [main, assessment-builds, codex/ctrl-mihir-dev]
  pull_request:
    branches: [main, assessment-builds, codex/ctrl-mihir-dev]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run lint
