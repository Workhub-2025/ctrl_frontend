name: FrontEnd CI

on:
  push:
    branches: [main, assessment-builds, codex/ctrl-mihir-dev]
  pull_request:
    branches: [main, assessment-builds, codex/ctrl-mihir-dev]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run lint

  api-contract-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
      E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
      E2E_SHARED_CANDIDATE_ID: ${{ secrets.E2E_SHARED_CANDIDATE_ID }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_CLIENT_DOCUMENT_ID: ${{ secrets.E2E_CLIENT_DOCUMENT_ID }}
      E2E_HM_EMAIL: ${{ secrets.E2E_HM_EMAIL }}
      E2E_HM_PASSWORD: ${{ secrets.E2E_HM_PASSWORD }}
      E2E_ASSESSMENT_SESSION_ID: ${{ secrets.E2E_ASSESSMENT_SESSION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e -- e2e/api-contract.spec.ts
        continue-on-error: true
